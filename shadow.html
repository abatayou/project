<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>shadowing</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(to right, #e6f7ff, #f0fcff);
      margin: 0;
      padding: 0;
      color: #333;
    }

    header {
      background-color: #4db8ff;
      color: white;
      text-align: center;
      padding: 30px;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    h1 {
      margin: 0;
      font-size: 2.5em;
    }

    nav {
      text-align: center;
      margin: 20px;
    }

    nav a {
      display: inline-block;
      background-color: #4db8ff;
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 25px;
      transition: background-color 0.3s;
      font-weight: bold;
    }

    nav a:hover {
      background-color: #3399ff;
    }

    section {
      margin: 20px auto;
      padding: 20px;
      max-width: 900px;
      background-color: white;
      border-radius: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    h2 {
      color: #3399ff;
      margin-top: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background-color: #4db8ff;
      color: white;
      padding: 12px;
    }

    td {
      padding: 10px;
      border: 1px solid #ddd;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    .button {
      display: block;
      width: 220px;
      margin: 30px auto;
      padding: 15px;
      text-align: center;
      background-color: #4db8ff;
      color: white;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    .button:hover {
      background-color: #3399ff;
    }
  </style>
</head>
<body>

  <header>
    <h1>Shadowing</h1>
  </header>
   <section id="description">
  <h2>Short description</h2>
    <p>Shadowing is a technique of learning in which you simply listen to someone speaking and do a real-time repetition of the same words. </p>
  </section>
    
      
         <section id="examples">
       <h3>American accent </h3>

        </section>
</body></html>
